# Experiment 001: Baseline
# qwen7b_sentiment_r16a32_lr2e4_fingpt_v1

name: "exp001_baseline"
description: "Baseline configuration with default hyperparameters"

model:
  name: "unsloth/Qwen2.5-7B-Instruct-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  num_epochs: 3
  scheduler: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  optim: adamw_8bit
  fp16: true
  bf16: false

evaluation:
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  logging_steps: 5
