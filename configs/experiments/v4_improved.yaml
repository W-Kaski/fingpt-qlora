# FinGPT-QLoRA v4: diverse training targets, 3 epochs + early stopping.
# v3 → v4 changes: expanded IMPLICATIONS (4→15), 5 output format variants.
# Uses early stopping on eval_loss to prevent overfitting.

name: "v4_improved"
description: "v4 with diverse training targets, 3 epochs, early stopping on eval_loss."

model:
  name: "unsloth/Qwen2.5-7B-Instruct-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  experiment_name: "v4_improved"
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.0001
  num_epochs: 3
  scheduler: cosine
  warmup_steps: 50
  weight_decay: 0.01
  optim: adamw_8bit
  fp16: true
  bf16: false
  completion_only_loss: true
  packing: false
  max_train_examples: 5000
  max_eval_examples: 1000
  save_strategy: "steps"
  eval_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

evaluation:
  eval_steps: 100
  save_steps: 100
  save_total_limit: 5
  logging_steps: 5

data:
  train_split: 0.85
  val_split: 0.10
  test_split: 0.05
  task_weights:
    sentiment: 1.00
