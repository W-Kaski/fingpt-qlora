# FinGPT-QLoRA v3: completion-only SFT.

name: "v3_completion_only"
description: "Current Kaggle-backed production experiment: prompt-completion data with completion_only_loss."

model:
  name: "unsloth/Qwen2.5-7B-Instruct-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  experiment_name: "v3_completion_only"
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.0001
  num_epochs: 1
  scheduler: cosine
  warmup_ratio: 0.1
  weight_decay: 0.01
  optim: adamw_8bit
  fp16: true
  bf16: false
  completion_only_loss: true
  packing: false
  max_train_examples: 5000
  max_eval_examples: 1000

evaluation:
  eval_steps: 100
  save_steps: 100
  save_total_limit: 5
  logging_steps: 5

data:
  train_split: 0.85
  val_split: 0.10
  test_split: 0.05
  task_weights:
    sentiment: 1.00
