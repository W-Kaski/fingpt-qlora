# FinGPT-QLoRA v3 diagnostic smoke run.
# Purpose: verify environment, data contract, TRL config, loss path, and adapter save before full training.

name: "v3_diagnostic"
description: "Small-sample diagnostic run for v3 completion-only SFT."

model:
  name: "unsloth/Qwen2.5-7B-Instruct-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  experiment_name: "v3_diagnostic"
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.0001
  num_epochs: 1
  max_steps: 10
  scheduler: cosine
  warmup_ratio: 0.1
  weight_decay: 0.01
  optim: adamw_8bit
  fp16: true
  bf16: false
  completion_only_loss: true
  packing: false
  max_train_examples: 128
  max_eval_examples: 64
  save_strategy: "no"
  eval_strategy: "no"
  load_best_model_at_end: false

evaluation:
  eval_steps: 999999
  save_steps: 999999
  save_total_limit: 1
  logging_steps: 1

data:
  train_split: 0.85
  val_split: 0.10
  test_split: 0.05
  task_weights:
    sentiment: 1.00
